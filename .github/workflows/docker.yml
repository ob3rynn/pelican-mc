name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Images
        run: |
          docker build --build-arg BASE_IMAGE=ghcr.io/pelican-eggs/yolks:java_17 -t ghcr.io/${{ github.repository_owner }}/pelican-mc:java17 .
          docker build --build-arg BASE_IMAGE=ghcr.io/pelican-eggs/yolks:java_21 -t ghcr.io/${{ github.repository_owner }}/pelican-mc:java21 .

      - name: Push Images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/pelican-mc:java17
          docker push ghcr.io/${{ github.repository_owner }}/pelican-mc:java21